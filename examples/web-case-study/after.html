<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Nimbus — ship faster</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font: 16px/1.5 -apple-system, "Segoe UI", system-ui, sans-serif; color: #131316; background: #ffffff; }
  .wrap { max-width: 980px; margin: 0 auto; padding: 0 28px; }
  nav { display: flex; align-items: center; justify-content: space-between; padding: 22px 0; }
  .logo { font-weight: 700; font-size: 19px; letter-spacing: -.02em; }
  .logo span { color: #2563eb; }
  .menu { width: 40px; height: 40px; border: 0; background: #f1f3f5; border-radius: 10px; font-size: 18px; cursor: pointer; }
  .menu:focus-visible { outline: 3px solid #2563eb; outline-offset: 2px; }
  .hero { padding: 64px 0 40px; max-width: 620px; }
  .badge { display: inline-block; font-size: 13px; font-weight: 600; color: #1d4ed8; background: #eef4ff; padding: 5px 11px; border-radius: 999px; margin-bottom: 20px; }
  h1 { font-size: 46px; line-height: 1.08; letter-spacing: -.03em; font-weight: 800; }
  .sub { font-size: 18px; color: #5c5c5c; margin-top: 18px; max-width: 520px; }
  .row { display: flex; gap: 14px; align-items: center; margin-top: 30px; }
  .cta { background: #2563eb; color: #fff; font-weight: 600; font-size: 16px; padding: 13px 22px; border-radius: 11px; cursor: pointer; border: 0; font-family: inherit; }
  .cta:focus-visible { outline: 3px solid #1d4ed8; outline-offset: 2px; }
  .more { color: #2563eb; font-weight: 600; text-decoration: none; }
  .shot { margin: 26px 0 60px; }
  .shot img { width: 100%; border-radius: 16px; box-shadow: 0 24px 60px rgba(19,19,22,.14); display: block; }
  .trust { color: #5c5c5c; font-size: 14px; padding-bottom: 40px; }
</style>
</head>
<body>
  <div class="wrap">
    <nav>
      <div class="logo">Nim<span>bus</span></div>
      <button class="menu" aria-label="Open menu">☰</button>
    </nav>

    <header class="hero">
      <span class="badge">New · v2 is here</span>
      <h1>Ship your product before the coffee gets cold.</h1>
      <p class="sub">Nimbus turns a Friday idea into a deployed app by Monday. Preview every change, roll back in one click, and let your team move without breaking things.</p>
      <div class="row">
        <button class="cta" onclick="alert('start')">Start free trial</button>
        <a class="more" href="#features">See how it works</a>
      </div>
    </header>

    <div class="shot">
      <img alt="Nimbus dashboard preview showing a deploy in progress" src="data:image/svg+xml;utf8,&lt;svg xmlns='http://www.w3.org/2000/svg' width='1200' height='560'&gt;&lt;defs&gt;&lt;linearGradient id='g' x1='0' y1='0' x2='1' y2='1'&gt;&lt;stop offset='0' stop-color='%23dbe7ff'/&gt;&lt;stop offset='1' stop-color='%23eef4ff'/&gt;&lt;/linearGradient&gt;&lt;/defs&gt;&lt;rect width='1200' height='560' fill='url(%23g)'/&gt;&lt;rect x='60' y='60' width='520' height='34' rx='8' fill='%23b9cdf5'/&gt;&lt;rect x='60' y='120' width='760' height='18' rx='6' fill='%23cdddfb'/&gt;&lt;rect x='60' y='150' width='680' height='18' rx='6' fill='%23cdddfb'/&gt;&lt;rect x='60' y='420' width='220' height='52' rx='12' fill='%232563eb'/&gt;&lt;/svg&gt;" />
    </div>

    <p class="trust">Trusted by 4,000+ teams shipping every day.</p>
  </div>
</body>
</html>
